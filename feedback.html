<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task Master - Feedback</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Navigation Bar -->
  <nav class="navbar">
    <h1 class="logo">Task Master</h1>
    <ul class="nav-links">
      <li><a href="home.html">Home</a></li>
      <li><a href="timer.html">Timer</a></li>
      <li><a href="daily-checklist.html">Daily Checklist</a></li>
      <li><a href="calendar.html">Calendar</a></li>
      <li><a href="feedback.html" class="active">Feedback</a></li>
      <li><a href="about.html">About</a></li>
      <li><button class="logout-button" onclick="logout()">Log Out</button></li>
    </ul>
  </nav>

  <!-- Main Content -->
  <main class="container">
    <h2>Feedback</h2>
    <p class="subtitle">Have an idea or found a bug? Let us know.</p>

    <div class="feedback-form">
      <input type="text" id="feedbackName" placeholder="Name" />
      <input type="email" id="feedbackEmail" placeholder="Email" />
      <input type="tel" id="feedbackPhone" placeholder="Phone Number (optional)" />
      <textarea id="feedbackInput" placeholder="Type your feedback here..." rows="5"></textarea>
      <button>Submit Feedback</button>
    </div>

    <div class="contact-info">
      <h3>Other Ways to Reach Us</h3>
      <p>Email: <a href="mailto:youremail@example.com">youremail@example.com</a></p>
      <p>Twitter / X: <a href="#">@yourhandle</a></p>
      <p>Instagram: <a href="#">@yourhandle</a></p>
    </div>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="auth-guard.js"></script>
</body>
</html>
