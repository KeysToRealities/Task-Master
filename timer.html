<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task Master - Timer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Navigation Bar -->
  <nav class="navbar">
    <h1 class="logo">Task Master</h1>
    <ul class="nav-links">
      <li><a href="home.html">Home</a></li>
      <li><a href="timer.html" class="active">Timer</a></li>
      <li><a href="daily-checklist.html">Daily Checklist</a></li>
      <li><a href="calendar.html">Calendar</a></li>
      <li><a href="feedback.html">Feedback</a></li>
      <li><a href="about.html">About</a></li>
      <li><button class="logout-button" onclick="logout()">Log Out</button></li>
    </ul>
  </nav>

  <!-- Main Content -->
  <main class="container">
    <section id="timer" class="page-section">
      <div class="section-title">
        <h2>Focus Timer</h2>
        <p>Track how long you spend working on a task.</p>
      </div>

      <div class="timer-card">
        <div class="timer-buttons">
          <button class="duration-btn" data-minutes="5" onclick="setTimer(5)">5 Min</button>
          <button class="duration-btn" data-minutes="15" onclick="setTimer(15)">15 Min</button>
          <button class="duration-btn active" data-minutes="25" onclick="setTimer(25)">25 Min</button>
          <button class="duration-btn" data-minutes="30" onclick="setTimer(30)">30 Min</button>
        </div>

        <div class="timer-ring" id="timerRing">
          <div class="timer-ring-inner">
            <h2 id="timerDisplay">25:00</h2>
          </div>
        </div>

        <p id="timerMessage">Select a time and press Start.</p>

        <div class="timer-controls">
          <button onclick="startTimer()">Start</button>
          <button class="secondary-button" onclick="pauseTimer()">Pause</button>
          <button class="reset-button" onclick="resetTimer()">Reset</button>
        </div>
      </div>
    </section>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="auth-guard.js"></script>
  <script src="timer.js"></script>
</body>
</html>
